<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="微信Markdown转换器">
<title>Markdown 预览 · 渲染工具</title>
<script src="../../assets/js/marked.min.js"></script>
<link rel="stylesheet" href="../../assets/css/github.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#eef2f7;--panel:#fff;--line:#e7ecf3;--text:#1e293b;--sub:#64748b;--muted:#94a3b8;--accent:#3b82f6;--accent-2:#2563eb;--accent-soft:#dbeafe;--radius:12px;--shadow:0 4px 16px rgba(15,23,42,.06)}
html,body{height:100%}
body{background:var(--bg);font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);line-height:1.6;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.topbar{height:56px;background:#fff;color:#333;display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;border-bottom:1px solid #e8e8e8;box-shadow:0 1px 6px rgba(0,0,0,.04);z-index:30}
.topbar .brand{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;color:#1e293b}
.topbar .brand .logo{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff}
.topbar .spacer{flex:1}
.tbtn{height:34px;padding:0 12px;border-radius:8px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px;transition:.15s;white-space:nowrap}
.tbtn.ghost{background:#f1f4f8;color:#475569}
.tbtn.ghost:hover{background:#e2e8f0}
.tbtn.success{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;box-shadow:0 2px 8px rgba(22,163,74,.3);height:32px;font-size:12px}
.tbtn.success:hover{filter:brightness(1.08)}
.workspace{display:flex;height:calc(100vh - 56px);gap:10px;padding:10px}
.col{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;min-width:0}
.col-left{flex:0 0 45%}
.col-right{flex:1}
.col-head{height:40px;padding:0 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;border-bottom:1px solid var(--line);background:#fbfcfe;font-size:13px;font-weight:700;color:#334155}
.col-head .hint{margin-left:auto;font-weight:400;color:var(--muted);font-size:11px}
.editor-wrap{flex:1;position:relative;display:flex;flex-direction:column;min-height:0}
textarea{flex:1;padding:14px 16px;outline:none;border:none;resize:none;font-family:'Courier New',monospace;font-size:13px;line-height:1.7;color:#334155;width:100%;background:#fcfdff}
#preview{flex:1;padding:14px 16px;overflow-y:auto;background:#fff;line-height:1.6;font-size:16px;color:#333}
#preview img{max-width:100%!important;height:auto!important}
.wx-content{line-height:1.6;font-size:16px;color:#333}
.wx-content img{max-width:100%!important;height:auto!important}
#toast{position:fixed;top:22px;left:50%;transform:translateX(-50%) translateY(-60px);background:linear-gradient(45deg,#FFD1DC,#FFB5E8);color:#444;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.1);display:flex;align-items:center;gap:6px}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media (max-width:768px){.workspace{flex-direction:column;height:auto}.col-left,.col-right{flex:1 1 auto;width:100%;min-height:300px}}
</style>
</head>
<body>

<header class="topbar">
  <div class="brand"><span class="logo">📝</span>Markdown 预览</div>
  <span style="font-size:11px;color:var(--muted)">实时渲染 · 复制公众号内容</span>
  <div class="spacer"></div>
  <a href="../../index.html" class="tbtn ghost" style="text-decoration:none">🏠 返回主页</a>
</header>

<div class="workspace">
  <section class="col col-left">
    <div class="col-head"><span>📝 Markdown 输入</span></div>
    <div class="editor-wrap">
      <textarea id="editor" placeholder="输入Markdown内容..."></textarea>
    </div>
  </section>
  <section class="col col-right">
    <div class="col-head"><span>📄 预览</span></div>
    <div id="preview" class="wx-content"></div>
    <div style="padding:8px 12px;border-top:1px solid var(--line);display:flex;gap:8px;flex-shrink:0;background:#fafbfc;align-items:center">
      <span style="font-size:11px;color:var(--muted)">📋 复制到公众号：</span>
      <button class="tbtn success" onclick="copyWechatHTML()">📋 一键复制</button>
    </div>
  </section>
</div>

<div id="toast">🎈 复制成功！</div>

<script>
        const strval = "# 欢迎使用马克飞象\n" +
                    "\n" +
                    "@(示例笔记本)[马克飞象|帮助|Markdown]\n" +
                    "\n" +
                    "**马克飞象**是一款专为印象笔记（Evernote）打造的Markdown编辑器，通过精心的设计与技术实现，配合印象笔记强大的存储和同步功能，带来前所未有的书写体验。特点概述：\n" +
                    " \n" +
                    "- **功能丰富** ：支持高亮代码块、*LaTeX* 公式、流程图，本地图片以及附件上传，甚至截图粘贴，工作学习好帮手；\n" +
                    "- **得心应手** ：简洁高效的编辑器，提供[桌面客户端][1]以及[离线Chrome App][2]，支持移动端 Web；\n" +
                    "- **深度整合** ：支持选择笔记本和添加标签，支持从印象笔记跳转编辑，轻松管理。\n" +
                    "\n" +
                    "-------------------\n" +
                    "\n" +
                    "[TOC]\n" +
                    "\n" +
                    "## Markdown简介\n" +
                    "\n" +
                    "> Markdown 是一种轻量级标记语言，它允许人们使用易读易写的纯文本格式编写文档，然后转换成格式丰富的HTML页面。    —— [维基百科](https://zh.wikipedia.org/wiki/Markdown)\n" +
                    "\n" +
                    "正如您在阅读的这份文档，它使用简单的符号标识不同的标题，将某些文字标记为**粗体**或者*斜体*，创建一个[链接](http://www.example.com)或一个脚注[^demo]。下面列举了几个高级功能，更多语法请按`Ctrl + /`查看帮助。 \n" +
                    "\n" +
                    "### 代码块\n" +
                    "``` python\n" +
                    "@requires_authorization\n" +
                    "def somefunc(param1='', param2=0):\n" +
                    "    '''A docstring'''\n" +
                    "    if param1 > param2: # interesting\n" +
                    "        print 'Greater'\n" +
                    "    return (param2 - param1 + 1) or None\n" +
                    "class SomeClass:\n" +
                    "    pass\n" +
                    ">>> message = '''interpreter\n" +
                    "... prompt'''\n" +
                    "```\n" +
                    "### LaTeX 公式\n" +
                    "\n" +
                    "可以创建行内公式，例如 $\\Gamma(n) = (n-1)!\\quad\\forall n\\in\\mathbb N$。或者块级公式：\n" +
                    "\n" +
                    "$$\tx = \\dfrac{-b \\pm \\sqrt{b^2 - 4ac}}{2a} $$\n" +
                    "\n" +
                    "### 表格\n" +
                    "| Item      |    Value | Qty  |\n" +
                    "| :-------- | --------:| :--: |\n" +
                    "| Computer  | 1600 USD |  5   |\n" +
                    "| Phone     |   12 USD |  12  |\n" +
                    "| Pipe      |    1 USD | 234  |\n" +
                    "\n" +
                    "### 流程图\n" +
                    "```flow\n" +
                    "st=>start: Start\n" +
                    "e=>end\n" +
                    "op=>operation: My Operation\n" +
                    "cond=>condition: Yes or No?\n" +
                    "\n" +
                    "st->op->cond\n" +
                    "cond(yes)->e\n" +
                    "cond(no)->op\n" +
                    "```\n" +
                    "\n" +
                    "以及时序图:\n" +
                    "\n" +
                    "```sequence\n" +
                    "Alice->Bob: Hello Bob, how are you?\n" +
                    "Note right of Bob: Bob thinks\n" +
                    "Bob-->Alice: I am good thanks!\n" +
                    "```\n" +
                    "\n" +
                    "> **提示：**想了解更多，请查看**流程图**[语法][3]以及**时序图**[语法][4]。\n" +
                    "\n" +
                    "### 复选框\n" +
                    "\n" +
                    "使用 `- [ ]` 和 `- [x]` 语法可以创建复选框，实现 todo-list 等功能。例如：\n" +
                    "\n" +
                    "- [x] 已完成事项\n" +
                    "- [ ] 待办事项1\n" +
                    "- [ ] 待办事项2\n" +
                    "\n" +
                    "> **注意：**目前支持尚不完全，在印象笔记中勾选复选框是无效、不能同步的，所以必须在**马克飞象**中修改 Markdown 原文才可生效。下个版本将会全面支持。\n" +
                    "\n" +
                    "\n" +
                    "## 印象笔记相关\n" +
                    "\n" +
                    "### 笔记本和标签\n" +
                    "**马克飞象**增加了`@(笔记本)[标签A|标签B]`语法, 以选择笔记本和添加标签。 **绑定账号后**， 输入`(`自动会出现笔记本列表，请从中选择。\n" +
                    "\n" +
                    "### 笔记标题\n" +
                    "**马克飞象**会自动使用文档内出现的第一个标题作为笔记标题。例如本文，就是第一行的 `欢迎使用马克飞象`。\n" +
                    "\n" +
                    "### 快捷编辑\n" +
                    "保存在印象笔记中的笔记，右上角会有一个红色的编辑按钮，点击后会回到**马克飞象**中打开并编辑该笔记。\n" +
                    ">**注意：**目前用户在印象笔记中单方面做的任何修改，马克飞象是无法自动感知和更新的。所以请务必回到马克飞象编辑。\n" +
                    "\n" +
                    "### 数据同步\n" +
                    "**马克飞象**通过**将Markdown原文以隐藏内容保存在笔记中**的精妙设计，实现了对Markdown的存储和再次编辑。既解决了其他产品只是单向导出HTML的单薄，又规避了服务端存储Markdown带来的隐私安全问题。这样，服务端仅作为对印象笔记 API调用和数据转换之用。\n" +
                    "\n" +
                    " >**隐私声明：用户所有的笔记数据，均保存在印象笔记中。马克飞象不存储用户的任何笔记数据。**\n" +
                    "\n" +
                    "### 离线存储\n" +
                    "**马克飞象**使用浏览器离线存储将内容实时保存在本地，不必担心网络断掉或浏览器崩溃。为了节省空间和避免冲突，已同步至印象笔记并且不再修改的笔记将删除部分本地缓存，不过依然可以随时通过`文档管理`打开。\n" +
                    "\n" +
                    "> **注意：**虽然浏览器存储大部分时候都比较可靠，但印象笔记作为专业云存储，更值得信赖。以防万一，**请务必经常及时同步到印象笔记**。\n" +
                    "\n" +
                    "## 编辑器相关\n" +
                    "### 设置\n" +
                    "右侧系统菜单（快捷键`Ctrl + M`）的`设置`中，提供了界面字体、字号、自定义CSS、vim/emacs 键盘模式等高级选项。\n" +
                    "\n" +
                    "### 快捷键\n" +
                    "\n" +
                    "帮助    `Ctrl + /`\n" +
                    "同步文档    `Ctrl + S`\n" +
                    "创建文档    `Ctrl + Alt + N`\n" +
                    "最大化编辑器    `Ctrl + Enter`\n" +
                    "预览文档 `Ctrl + Alt + Enter`\n" +
                    "文档管理    `Ctrl + O`\n" +
                    "系统菜单    `Ctrl + M` \n" +
                    "\n" +
                    "加粗    `Ctrl + B`\n" +
                    "插入图片    `Ctrl + G`\n" +
                    "插入链接    `Ctrl + L`\n" +
                    "提升标题    `Ctrl + H`\n" +
                    "\n" +
                    "## 关于收费\n" +
                    "\n" +
                    "**马克飞象**为新用户提供 10 天的试用期，试用期过后需要[续费](maxiang.info/vip.html)才能继续使用。未购买或者未及时续费，将不能同步新的笔记。之前保存过的笔记依然可以编辑。\n" +
                    "\n" +
                    "\n" +
                    "## 反馈与建议\n" +
                    "- 微博：[@马克飞象](http://weibo.com/u/2788354117)，[@GGock](http://weibo.com/ggock \"开发者个人账号\")\n" +
                    "- 邮箱：<hustgock@gmail.com>\n" +
                    "\n" +
                    "---------\n" +
                    "感谢阅读这份帮助文档。请点击右上角，绑定印象笔记账号，开启全新的记录与分享体验吧。\n" +
                    "\n" +
                    "\n" +
                    "\n" +
                    "\n" +
                    "[^demo]: 这是一个示例脚注。请查阅 [MultiMarkdown 文档](https://github.com/fletcher/MultiMarkdown/wiki/MultiMarkdown-Syntax-Guide#footnotes) 关于脚注的说明。 **限制：** 印象笔记的笔记内容使用 [ENML][5] 格式，基于 HTML，但是不支持某些标签和属性，例如id，这就导致`脚注`和`TOC`无法正常点击。\n" +
                    "\n" +
                    "\n" +
                    "  [1]: http://maxiang.info/client_zh\n" +
                    "  [2]: https://chrome.google.com/webstore/detail/kidnkfckhbdkfgbicccmdggmpgogehop\n" +
                    "  [3]: http://adrai.github.io/flowchart.js/\n" +
                    "  [4]: http://bramp.github.io/js-sequence-diagrams/\n" +
                    "  [5]: https://dev.yinxiang.com/doc/articles/enml.php\n" +
                    "\n";

        // 初始化Markdown解析器
        marked.setOptions({
            breaks: true,
            highlight: function(code) {
                return hljs.highlightAuto(code).value;
            }
        });

        // 实时预览
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');

        editor.addEventListener('input', () => {
            const markdown = editor.value;
            const html = marked.parse(markdown);
            preview.innerHTML = html;
        });

        editor.value = strval
        const html = marked.parse(editor.value);
        preview.innerHTML = html;

        // 复制公众号兼容内容
        function copyWechatHTML() {
            // 创建临时容器处理样式
            const tempDiv = document.createElement('div');
            tempDiv.className = 'wx-content';
            tempDiv.innerHTML = preview.innerHTML;

            // 处理图片样式
            const images = tempDiv.querySelectorAll('img');
            images.forEach(img => {
                img.style.maxWidth = '100%';
                img.style.height = 'auto';
                img.removeAttribute('width');
                img.removeAttribute('height');
            });

            // 处理代码块样式
            const codeBlocks = tempDiv.querySelectorAll('pre code');
            codeBlocks.forEach(code => {
                code.style.backgroundColor = '#f6f8fa';
                code.style.padding = '15px';
                code.style.borderRadius = '4px';
                code.style.display = 'block';
                code.style.overflowX = 'auto';
            });

            // 创建复制内容
            const htmlContent = `
                <div style="line-height: 1.6; font-size: 16px; color: #333;">
                    ${tempDiv.innerHTML}
                </div>
            `;

            // 执行复制
            const blob = new Blob([htmlContent], {type: 'text/html'});
            const clipboardItem = new ClipboardItem({'text/html': blob});
            
            navigator.clipboard.write([clipboardItem]).then(() => {
                showToast('✨ 复制HTML已复制到剪贴板！');
            }).catch(err => {
                showToast('❌ 复制失败，请手动复制');
            });
        }

        function showToast(message, duration = 2000) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }
    </script>
    
    <!-- 代码高亮 -->
    <script src="../../assets/js/highlight.min.js"></script>
</body>
</html>
