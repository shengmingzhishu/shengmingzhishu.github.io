<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="微信Markdown转换器">
<title>MD 换行格式化 · 排版工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#eef2f7;--panel:#fff;--line:#e7ecf3;--text:#1e293b;--sub:#64748b;--muted:#94a3b8;--accent:#3b82f6;--accent-2:#2563eb;--accent-soft:#dbeafe;--radius:12px;--shadow:0 4px 16px rgba(15,23,42,.06)}
html,body{height:100%}
body{background:var(--bg);font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);line-height:1.6;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

/* topbar */
.topbar{height:56px;background:#fff;color:#333;display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;border-bottom:1px solid #e8e8e8;box-shadow:0 1px 6px rgba(0,0,0,.04);z-index:30}
.topbar .brand{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;color:#1e293b}
.topbar .brand .logo{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff}
.topbar .spacer{flex:1}
.tbtn{height:34px;padding:0 12px;border-radius:8px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px;transition:.15s;white-space:nowrap}
.tbtn.ghost{background:#f1f4f8;color:#475569}
.tbtn.ghost:hover{background:#e2e8f0}
.tbtn.success{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;box-shadow:0 2px 8px rgba(22,163,74,.3);height:32px;font-size:12px}
.tbtn.success:hover{filter:brightness(1.08)}

/* workspace */
.workspace{display:flex;height:calc(100vh - 56px);gap:10px;padding:10px}
.col{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;min-width:0}
.col-left{flex:0 0 45%}
.col-right{flex:1}
.col-head{height:40px;padding:0 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;border-bottom:1px solid var(--line);background:#fbfcfe;font-size:13px;font-weight:700;color:#334155}
.col-head .hint{margin-left:auto;font-weight:400;color:var(--muted);font-size:11px}

/* options */
.opt-bar{display:flex;align-items:center;gap:6px;padding:6px 10px;border-bottom:1px solid var(--line);flex-wrap:wrap;background:#fafbfc;flex-shrink:0;font-size:12px}
.opt-bar .lbl{font-size:11px;color:var(--muted);font-weight:600;margin-right:2px}
.opt-bar label{font-size:11px;display:inline-flex;align-items:center;gap:2px;cursor:pointer;margin-right:6px}
.opt-bar input[type="radio"]{margin:0;cursor:pointer}
.opt-btn{height:26px;padding:0 10px;border-radius:6px;font-size:11px;font-weight:600;color:#475569;background:#f1f5f9;display:inline-flex;align-items:center;gap:3px;transition:.12s;border:1px solid transparent;cursor:pointer;font-family:inherit}
.opt-btn:hover{background:var(--accent-soft);color:var(--accent-2);border-color:#bfdbfe}
.opt-btn.danger:hover{background:#fee2e2;color:#dc2626;border-color:#fecaca}

/* user row */
.user-row{display:flex;align-items:center;gap:10px;padding:4px 10px;border-bottom:1px solid var(--line);background:#fafbfc;flex-shrink:0;font-size:12px}
.user-row label{font-size:11px;color:var(--muted);font-weight:600}
.user-row input{height:26px;padding:0 8px;border:1px solid #ddd;border-radius:6px;font-size:11px;outline:none;background:#fff}
.user-row input:focus{border-color:var(--accent)}

/* editor */
.editor-wrap{flex:1;position:relative;display:flex;flex-direction:column;min-height:0}
#editor{flex:1;padding:14px 16px;outline:none;border:none;resize:none;font-family:'Courier New',monospace;font-size:13px;line-height:1.7;color:#334155;width:100%;background:#fcfdff}
#preview{flex:1;padding:14px 16px;overflow-y:auto;background:#fff;line-height:1.6;font-size:16px;color:#333}
#preview img{max-width:100%!important;height:auto!important}

/* toast */
#toast{position:fixed;top:22px;left:50%;transform:translateX(-50%) translateY(-60px);background:linear-gradient(45deg,#FFD1DC,#FFB5E8);color:#444;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.1);display:flex;align-items:center;gap:6px}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media (max-width:768px){
  .workspace{flex-direction:column;height:auto}
  .col-left,.col-right{flex:1 1 auto;width:100%;min-height:300px}
}
</style>

<div id="toast">🎈 复制成功！</div>

        if (this.checked) { paragraphMode = true; updatePreview(); }

    document.getElementById('para-off').addEventListener('change', function() {
        if (this.checked) { paragraphMode = false; updatePreview(); }
    });
    document.getElementById('align-left').addEventListener('change', function() {
        if (this.checked) { alignMode = 'left'; updatePreview(); }
    });
    document.getElementById('align-center').addEventListener('change', function() {
        if (this.checked) { alignMode = 'center'; updatePreview(); }
    });
    document.getElementById('user-id').addEventListener('change', function(e) {
        userId = e.target.value; updatePreview();
    });
    document.getElementById('user-name').addEventListener('change', function(e) {
        userName = e.target.value; updatePreview();
    });
    document.getElementById('clear-enter').addEventListener('click', clearEnter);
    document.getElementById('clear-sort').addEventListener('click', clearSort);
    document.getElementById('clear-short').addEventListener('click', clearShort);
    document.getElementById('format-url').addEventListener('click', function() {
        setUniqueUrlsToEditor();
    });
});

function clearEnter() {
    let ta = document.getElementById('editor');
    let t = ta.value;
    t = t.replace(/\r\n/g, '').replace(/\r/g, '').replace(/\n\n/g, '\n');
    t = t.trim();
    ta.value = t;
    updatePreview();
}

function clearSort() {
    let ta = document.getElementById('editor');
    let lines = ta.value.split('\n');
    let filteredLines = lines.sort(() => Math.random() - 0.5);
    ta.value = filteredLines.join('\n');
    updatePreview();
}

function clearShort() {
    let ta = document.getElementById('editor');
    let lines = ta.value.split('\n');
    let filteredLines = lines.filter(function(line) {
        return line.trim() === '' || line.trim().length > 3;
    });
    ta.value = filteredLines.join('\n');
    updatePreview();
}

    var patterns = [
        /#{1,8}\s/g,
        /\d+\./g,
        /-\s/g,
        />\s/g,

    ];
    var formattedText = text;
    patterns.forEach(function(pattern) {
        formattedText = formattedText.replace(pattern, function(match) { return '\n' + match; });
    });
    return formattedText;
}

var rawText = '### 一、角色定位与核心目标- **角色定位**：咪蒙风格公众号"情绪爆破手"，专注挖掘年轻人"隐忍的委屈/愤怒/不甘"，用"反常识观点"打破"沉默的共识"。- **核心目标**：生成3-5个"具体场景+极端情绪"选题，兼顾"痛点戳中率"（≥80%）、"反常识指数"（≥70%）与"传播潜力"（家庭群/朋友圈转发率预测）。### 二、工具能力范围与限制- **工具清单**：年轻人情绪痛点库（如"职场甩锅/情感背叛/原生家庭控制"）、反常识观点生成工具（如"职场不相信眼泪→要哭回家哭"）、情绪传播潜力预测模型。- **能力边界**：仅围绕"职场/情感/原生家庭"三大年轻人核心情绪赛道，禁用抽象概念（如"成长""治愈"），需含"具体冲突场景"（如"同事甩锅""男友冷暴力"）。### 三、标准操作流程1. 需求接收：获取热点榜单（如"职场PUA"）、用户画像（如"25岁职场新人/被同事甩锅"）、竞品高转发文章关键词（如"反常识/情绪爆发"）。2. 需求确认：明确公众号定位（如"职场情绪反击"）及禁忌方向（避免"说教式""治愈系"）。3. 工具调用：用痛点库筛选"隐忍情绪"（如"被同事抢功劳"），用反常识工具生成观点（如"我凭什么要帮你？"）。4. 执行监控：检查选题是否符合"具体场景+反常识"（如"同事甩锅→我当众怼回去"），避免与历史3个月"职场"类选题重复。5. 结果整理：按"情绪传播潜力"排序，附理由（如"职场不相信眼泪→戳中85%职场新人的委屈"）。### 四、输入输出规范- **输入要求**：需提供具体热点（如"某明星职场PUA事件"）、用户画像（如"25岁/职场新人/被同事甩锅"）、竞品高转发关键词（如"反常识/情绪爆发"）。- **输出规范**：每个选题含20字内标题（如《职场不相信眼泪，要哭回家哭》）、30字内痛点理由（如"戳中职场新人被甩锅的委屈"）、反常识观点（如"职场不是慈善机构，你的善良要带锋芒"）、传播指数（1-10分）。### 五、异常处理机制- 输入异常：热点数据不足时，调用"历史高转发情绪痛点"（如"情感背叛/原生家庭控制"）生成备选。- 工具异常：反常识工具失效时，基于"用户画像"直接生成（如"25岁职场新人→我凭什么要帮你？"）。### 六、示例场景参考*示例场景*："用户指令：结合同事甩锅热点生成选题你的处理步骤：1. 确认需求：定位职场情绪反击，需突出反常识+情绪爆发。2. 调用工具：筛选被同事甩锅痛点，生成反常识观点职场不相信眼泪。3. 输出结果：选题《职场不相信眼泪，要哭回家哭》（传播指数9分，理由：戳中85%职场新人的委屈，反常识观点引发共鸣）。### 总结：用"具体冲突场景+反常识观点"，让选题"一戳就炸"。';

var editor = document.getElementById('editor');
var preview = document.getElementById('preview');

function updatePreview() {
    var markdown = editor.value;
    var html = autoFormatText(markdown);
    preview.innerHTML = html;
}

editor.addEventListener('input', updatePreview);
editor.value = rawText;
updatePreview();

function copyWechatHTML() {
    var markdown = editor.value;
    var htmlContent = autoFormatText(markdown);
    var textarea = document.createElement('textarea');
    textarea.value = htmlContent;
    document.body.appendChild(textarea);
    try {
        textarea.select();
        textarea.setSelectionRange(0, textarea.value.length);
        var successful = document.execCommand('copy');
        if (successful) {
            showToast('✨ 复制成功！');
        } else {
            showToast('复制失败，请使用Ctrl+C手动复制');
        }
    } catch (err) {
        console.error('复制失败:', err);
        showToast('复制失败，请使用Ctrl+C手动复制');
    } finally {
        document.body.removeChild(textarea);
    }
}

function showToast(message, duration) {
    if (!duration) duration = 2000;
    var toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(function() {
        toast.classList.remove('show');
    }, duration);
}
