<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>批量图片压缩/裁切工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#07c160;--primary-dark:#06ad56;--primary-light:#e8f8f0;
  --bg:#f0f2f5;--card:#fff;--text:#1a1a1a;--text-sub:#666;--text-light:#999;
  --border:#e5e7eb;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,.08);
  --shadow-lg:0 4px 16px rgba(0,0,0,.12);--accent:#5b6ef5;--orange:#f59a23;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.header h1{font-size:18px;font-weight:600;display:flex;align-items:center;gap:8px}
.header h1 .icon{font-size:22px}
.header .subtitle{font-size:12px;color:var(--text-light);margin-top:2px}
.header-actions{display:flex;gap:10px}
.main{display:flex;gap:16px;padding:16px;height:calc(100vh - 62px);overflow:hidden}
.left-panel{width:360px;flex-shrink:0;overflow-y:auto;padding-right:4px}
.right-panel{flex:1;overflow-y:auto;background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#aaa}
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.card-title{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.card-title .step-num{background:var(--primary);color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:32px 16px;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--primary);background:var(--primary-light)}
.upload-zone .upload-icon{font-size:36px;color:var(--text-light);margin-bottom:8px}
.upload-zone p{color:var(--text-sub);font-size:13px}
.upload-zone input{display:none}
.file-list{margin-top:10px;max-height:180px;overflow-y:auto}
.file-item{display:flex;align-items:center;gap:8px;padding:4px 8px;background:#f9f9f9;border-radius:6px;margin-bottom:4px;font-size:12px}
.file-item .idx{background:var(--primary);color:#fff;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.file-item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.file-item .size{color:var(--text-light);font-size:11px;flex-shrink:0}
.form-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.form-row:last-child{margin-bottom:0}
.form-row label{font-size:13px;color:var(--text-sub);min-width:70px;flex-shrink:0}
.form-row input[type="number"],.form-row input[type="text"],.form-row select{flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;outline:none;transition:border-color .2s}
.form-row input:focus,.form-row select:focus{border-color:var(--primary)}
.form-row input[type="range"]{flex:1;padding:0;border:none}
.form-row .value-tag{font-size:12px;color:var(--text-light);min-width:36px;text-align:right}
.form-row .hint{font-size:11px;color:var(--text-light);margin-left:4px}
.checkbox-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer}
.checkbox-row input[type="checkbox"]{width:16px;height:16px;accent-color:var(--primary);cursor:pointer}
.btn{padding:8px 16px;border:none;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;justify-content:center}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-primary:disabled{background:#ccc;cursor:not-allowed}
.btn-outline{background:#fff;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-accent{background:var(--accent);color:#fff}
.btn-orange{background:var(--orange);color:#fff}
.btn-block{width:100%}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 7px;font-size:11px}
.right-panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.right-panel-header h2{font-size:16px;font-weight:600}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-light)}
.empty-state .icon{font-size:48px;margin-bottom:12px;opacity:.5}
.global-size-bar{display:inline-flex;align-items:center;gap:4px;background:#f5f5f5;border-radius:8px;padding:4px 8px;font-size:12px}
.global-size-bar .size-input{width:56px;padding:2px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px;text-align:center;outline:none;background:#fff}
.global-size-bar .size-input:focus{border-color:var(--primary)}
.global-size-bar .size-x{color:var(--text-light);font-size:12px}
.global-size-bar .size-hint{color:var(--text-light);font-size:11px}
.global-size-bar .lock-toggle{display:inline-flex;align-items:center;cursor:pointer;line-height:1}
.global-size-bar .lock-toggle input{display:none}
.global-size-bar .lock-toggle .lock-icon{font-size:14px;opacity:.4;transition:opacity .2s}
.global-size-bar .lock-toggle input:checked+.lock-icon{opacity:1}
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px}
.img-card{background:#f9f9f9;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);transition:box-shadow .2s}
.img-card:hover{box-shadow:var(--shadow-lg)}
.img-card .preview{position:relative;width:100%;aspect-ratio:1;background:repeating-conic-gradient(#f0f0f0 0% 25%,#fff 0% 50%) 50%/16px 16px;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:grab}
.img-card .preview:active{cursor:grabbing}
.img-card .preview canvas{max-width:100%;max-height:100%;display:block}
.img-card .preview .drag-hint{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(0,0,0,.4);background:rgba(255,255,255,.7);padding:1px 6px;border-radius:3px;pointer-events:none;white-space:nowrap}
.img-card .info{padding:8px 10px}
.img-card .info .idx{font-size:11px;color:var(--text-light);margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
.img-card .info .name-text{font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.img-card .mini-actions{display:flex;gap:4px;padding:0 10px 4px}
.img-card .mini-actions .btn{flex:1;padding:4px 6px;font-size:11px}
.img-card .settings-toggle{padding:4px 10px 8px}
.img-card .settings-toggle button{width:100%;background:none;border:1px solid var(--border);border-radius:6px;padding:5px;font-size:12px;color:var(--text-sub);cursor:pointer;transition:all .15s}
.img-card .settings-toggle button:hover{border-color:var(--primary);color:var(--primary)}
.img-card .settings-toggle button .arrow{transition:transform .2s;display:inline-block}
.img-card .settings-toggle button.open .arrow{transform:rotate(180deg)}
.img-settings{max-height:0;overflow:hidden;transition:max-height .3s ease;padding:0 10px}
.img-settings.open{max-height:500px;overflow-y:auto;padding-bottom:10px}
.img-settings .mini-row{display:flex;align-items:center;gap:4px;margin-bottom:4px}
.img-settings .mini-row:last-child{margin-bottom:0}
.img-settings .mini-row label{font-size:11px;color:var(--text-light);min-width:32px}
.img-settings .mini-row input[type="range"]{flex:1;height:4px}
.img-settings .mini-row .mini-val{font-size:10px;color:var(--text-light);min-width:28px;text-align:right}
.img-settings .mini-row input[type="number"]{flex:1;padding:2px 4px;border:1px solid var(--border);border-radius:4px;font-size:11px;width:60px}
.img-settings .mini-row .num-hint{font-size:10px;color:var(--text-light);margin-left:2px}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle input{display:none}
.toggle-slider{position:absolute;inset:0;background:#ccc;border-radius:10px;cursor:pointer;transition:.2s}
.toggle-slider:before{content:'';position:absolute;width:16px;height:16px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-slider{background:var(--primary)}
.toggle input:checked+.toggle-slider:before{transform:translateX(16px)}
.quality-row{display:flex;align-items:center;gap:8px;padding:6px 0}
.quality-row label{font-size:12px;color:var(--text-sub);min-width:50px}
.quality-row input[type="range"]{flex:1}
.quality-row .val{font-size:12px;color:var(--text);min-width:36px;text-align:right}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:rgba(0,0,0,.8);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:400;transition:transform .3s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.8);z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.loading-overlay.show{display:flex}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--text-sub)}
/* 预览确认弹窗 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;width:90%;max-width:1100px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h2{font-size:16px;font-weight:600}
.modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--text-light);padding:0;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px}
.modal-close:hover{background:#f0f0f0}
.modal-body{flex:1;overflow-y:auto;padding:20px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:12px}
.preview-report-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.preview-report-item{text-align:center}
.preview-report-item .label{font-size:11px;color:var(--text-light);margin-bottom:4px}
.preview-report-item .img-wrap{background:repeating-conic-gradient(#f0f0f0 0% 25%,#fff 0% 50%) 50%/12px 12px;border-radius:8px;padding:8px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;min-height:120px}
.preview-report-item .img-wrap canvas{max-width:100%;max-height:200px;display:block;margin:0 auto}
.preview-report-item .name{font-size:11px;margin-top:4px;color:var(--text-sub);word-break:break-all}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1><span class="icon">🖼</span> 批量图片压缩/裁切工具</h1>
    <div class="subtitle">上传多张图片 → 统一/单独调整裁切 → 批量导出</div>
  </div>
  <div class="header-actions">
    <button class="btn btn-outline btn-sm" onclick="resetAll()">重置</button>
    <button class="btn btn-primary btn-sm" onclick="processAll()" id="btnProcess">⚡ 生成预览</button>
    <button class="btn btn-orange btn-sm" onclick="downloadZip()" id="btnDownload" disabled>📦 打包下载</button>
  </div>
</div>

<div class="main">
  <div class="left-panel">
    <div class="card">
      <div class="card-title"><span class="step-num">1</span> 上传图片</div>
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">📁</div>
        <p>点击或拖拽图片到此处</p>
        <p style="font-size:11px;color:var(--text-light);margin-top:4px">支持多选 PNG / JPG / WEBP</p>
        <input type="file" id="fileInput" accept="image/*" multiple>
      </div>
      <div id="fileList" class="file-list"></div>
    </div>

    <div class="card">
      <div class="card-title"><span class="step-num">2</span> 输出设置</div>
      <label class="checkbox-row"><input type="checkbox" id="enableCutout"><span>开启抠图（去背景）</span></label>
      <div id="cutoutOptions" style="display:none">
        <div class="form-row"><label>背景色</label><input type="color" id="bgColor" value="#ffffff"><span class="hint">取色</span></div>
        <div class="form-row"><label>容差</label><input type="range" id="tolerance" value="32" min="0" max="120"><span class="value-tag" id="toleranceVal">32</span></div>
        <label class="checkbox-row"><input type="checkbox" id="edgeFeather" checked><span>边缘羽化</span></label>
      </div>
      <div class="quality-row">
        <label>JPEG质量</label>
        <input type="range" id="jpgQuality" value="90" min="10" max="100">
        <span class="val" id="qualityVal">90%</span>
      </div>
      <label class="checkbox-row"><input type="checkbox" id="compressMode" checked><span>压缩模式（包含原图 + 裁切图）</span></label>
      <div class="form-row" style="margin-top:8px">
        <button class="btn btn-primary btn-block" onclick="processAll()">⚡ 生成预览</button>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="right-panel-header">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <h2>图片预览 <span style="font-size:12px;font-weight:400;color:var(--text-light);margin-left:8px">拖拽图片调整裁切位置</span></h2>
        <div class="global-size-bar">
          <span style="font-size:12px;color:var(--text-sub)">全局输出</span>
          <input type="number" id="globalW" value="800" min="16" max="4096" class="size-input">
          <span class="size-x">×</span>
          <input type="number" id="globalH" value="800" min="16" max="4096" class="size-input">
          <span class="size-hint">px</span>
          <label class="lock-toggle" title="锁定宽高比">
            <input type="checkbox" id="lockRatio" checked>
            <span class="lock-icon">🔗</span>
          </label>
        </div>
      </div>
      <span id="imgCount" style="font-size:13px;color:var(--text-light)">等待上传图片...</span>
    </div>
    <div id="imgContainer">
      <div class="empty-state">
        <div class="icon">📂</div>
        <p>请先上传图片</p>
        <p style="font-size:12px;margin-top:4px">支持多张图片同时上传</p>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="reportModal">
  <div class="modal">
    <div class="modal-header">
      <h2>📋 最终输出预览 — 确认裁切效果</h2>
      <button class="modal-close" onclick="closeReportModal()">×</button>
    </div>
    <div class="modal-body" id="reportBody"></div>
    <div class="modal-footer">
      <span style="font-size:12px;color:var(--text-light)" id="reportSummary"></span>
      <div style="display:flex;gap:8px">
        <button class="btn btn-outline btn-sm" onclick="closeReportModal()">继续调整</button>
        <button class="btn btn-orange btn-sm" onclick="doDownloadFromReport()">📦 打包下载</button>
      </div>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div><div class="loading-text" id="loadingText">处理中...</div></div>
<div class="toast" id="toast"></div>

<script>
// ============ State ============
const state = {
  images: [], // { name, size, file, srcCanvas, custom: { offsetX, offsetY, zoom, outW, outH, override } }
  globalW: 800, globalH: 800,
  enableCutout: false,
  bgColor: {r:255,g:255,b:255},
  tolerance: 32, edgeFeather: true,
  jpgQuality: 90,
  compressMode: true,
};

function createDefaultCustom(imgW, imgH){
  return {
    override: false,
    outW: null, outH: null,
    offsetX: 0, offsetY: 0,
    zoom: 1,
  };
}

// ============ Utils ============
function $(id){return document.getElementById(id)}
function showToast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function showLoading(msg){$('loadingText').textContent=msg||'处理中...';$('loadingOverlay').classList.add('show')}
function hideLoading(){$('loadingOverlay').classList.remove('show')}
function hexToRgb(hex){const m=hex.replace('#','').match(/.{2}/g);return{r:parseInt(m[0],16),g:parseInt(m[1],16),b:parseInt(m[2],16)}}
function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ============ Upload ============
const uploadZone=$('uploadZone');
const fileInput=$('fileInput');
uploadZone.addEventListener('dragover',e=>{e.preventDefault();uploadZone.classList.add('dragover')});
uploadZone.addEventListener('dragleave',()=>uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop',e=>{e.preventDefault();uploadZone.classList.remove('dragover');handleFiles(e.dataTransfer.files)});
fileInput.addEventListener('change',e=>{if(e.target.files.length)handleFiles(e.target.files)});

function handleFiles(files){
  const valid=[];
  for(const f of files){
    if(f.type.startsWith('image/'))valid.push(f);
  }
  if(!valid.length){showToast('请上传图片文件');return}
  let loaded=0;
  valid.forEach((file,i)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        state.images.push({
          idx: state.images.length,
          name: file.name,
          size: file.size,
          file: file,
          image: img,
          canvas: null, // 处理后缓存
          custom: createDefaultCustom(img.naturalWidth, img.naturalHeight),
        });
        loaded++;
        if(loaded===valid.length){
          updateFileList();
          renderImages();
          showToast(`已上传 ${valid.length} 张图片`);
        }
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function updateFileList(){
  const fl=$('fileList');
  if(state.images.length===0){fl.innerHTML='';return}
  fl.innerHTML=state.images.map((img,i)=>`
    <div class="file-item">
      <span class="idx">${i+1}</span>
      <span class="name">${escapeHtml(img.name)}</span>
      <span class="size">${(img.size/1024).toFixed(1)}KB</span>
    </div>
  `).join('');
  $('imgCount').textContent=`共 ${state.images.length} 张图片`;
  $('btnDownload').disabled=true;
}

// ============ Cutout Settings ============
$('enableCutout').addEventListener('change',e=>{
  state.enableCutout=e.target.checked;
  $('cutoutOptions').style.display=e.target.checked?'block':'none';
});
$('bgColor').addEventListener('input',e=>{state.bgColor=hexToRgb(e.target.value)});
$('tolerance').addEventListener('input',e=>{state.tolerance=parseInt(e.target.value);$('toleranceVal').textContent=e.target.value});
$('edgeFeather').addEventListener('change',e=>{state.edgeFeather=e.target.checked});
$('jpgQuality').addEventListener('input',e=>{
  state.jpgQuality=parseInt(e.target.value);
  $('qualityVal').textContent=state.jpgQuality+'%';
});
$('compressMode').addEventListener('change',e=>{state.compressMode=e.target.checked});

// ============ Global Size ============
$('globalW').addEventListener('input',syncGlobalSize);
$('globalH').addEventListener('input',syncGlobalSize);
$('lockRatio').addEventListener('change',syncGlobalSize);
let _syncing=false;
function syncGlobalSize(){
  if(_syncing)return;
  _syncing=true;
  state.globalW=parseInt($('globalW').value)||800;
  state.globalH=parseInt($('globalH').value)||800;
  _syncing=false;
  state.images.forEach((_,i)=>{
    if(!state.images[i].custom.override)renderPreview(i);
  });
}

// ============ Render Images ============
function renderImages(){
  const container=$('imgContainer');
  $('imgCount').textContent=`共 ${state.images.length} 张图片`;
  if(state.images.length===0){
    container.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>暂无图片</p></div>';
    return;
  }
  container.innerHTML='<div class="img-grid">'+state.images.map((img,i)=>`
    <div class="img-card" data-idx="${i}">
      <div class="preview" id="cpreview-${i}">
        <span class="drag-hint">拖拽调整位置</span>
      </div>
      <div class="info">
        <div class="idx"><span>#${i+1}</span> <span class="name-text">${escapeHtml(img.name)}</span></div>
      </div>
      <div class="mini-actions">
        <button class="btn btn-outline" onclick="resetImage(${i})">📍复位</button>
        <button class="btn btn-primary" onclick="downloadSingle(${i})">⬇ 下载</button>
      </div>
      <div class="settings-toggle">
        <button onclick="toggleSettings(${i})" id="csettings-btn-${i}">⚙️ 单独设置 <span class="arrow">▼</span></button>
      </div>
      <div class="img-settings" id="csettings-${i}">${renderSettings(i)}</div>
    </div>
  `).join('')+'</div>';
  state.images.forEach((_,i)=>{
    renderPreview(i);
    setupDrag(i);
  });
}

function renderSettings(i){
  const c=state.images[i].custom;
  const img=state.images[i].image;
  const nw=img.naturalWidth,nh=img.naturalHeight;
  return `
    <div class="mini-row">
      <label class="toggle" style="margin-right:4px">
        <input type="checkbox" id="coverride-${i}" ${c.override?'checked':''} onchange="toggleOverride(${i})">
        <span class="toggle-slider"></span>
      </label>
      <span style="font-size:11px;color:var(--text-sub)">自定义输出</span>
    </div>
    <div class="mini-row">
      <label>宽</label>
      <input type="number" min="16" max="4096" value="${c.outW||nw}" ${c.override?'':'disabled'} oninput="setCustomVal(${i},'outW',parseInt(this.value)||${nw})">
      <span class="num-hint">px</span>
    </div>
    <div class="mini-row">
      <label>高</label>
      <input type="number" min="16" max="4096" value="${c.outH||nh}" ${c.override?'':'disabled'} oninput="setCustomVal(${i},'outH',parseInt(this.value)||${nh})">
      <span class="num-hint">px</span>
    </div>
    <div class="mini-row"><label>缩放</label>
      <input type="range" min="10" max="500" value="${Math.round(c.zoom*100)}" oninput="setCustomVal(${i},'zoom',this.value/100);renderPreview(${i});document.getElementById('czoomTag-${i}').textContent=this.value+'%'">
      <span class="mini-val" id="czoomTag-${i}">${Math.round(c.zoom*100)}%</span>
    </div>
    <div class="mini-row"><label>X偏移</label>
      <input type="range" min="-50" max="50" value="${c.offsetX}" oninput="setCustomVal(${i},'offsetX',parseInt(this.value));renderPreview(${i});document.getElementById('coffXTag-${i}').textContent=this.value">
      <span class="mini-val" id="coffXTag-${i}">${c.offsetX}</span>
    </div>
    <div class="mini-row"><label>Y偏移</label>
      <input type="range" min="-50" max="50" value="${c.offsetY}" oninput="setCustomVal(${i},'offsetY',parseInt(this.value));renderPreview(${i});document.getElementById('coffYTag-${i}').textContent=this.value">
      <span class="mini-val" id="coffYTag-${i}">${c.offsetY}</span>
    </div>
    <div class="mini-row" style="margin-top:4px">
      <label>实际</label>
      <span style="font-size:11px;color:var(--text-light)">${nw}×${nh} → ${getOutputSize(i).w}×${getOutputSize(i).h}</span>
    </div>
  `;
}

function getOutputSize(i){
  const img=state.images[i];
  const c=img.custom;
  if(c.override&&c.outW&&c.outH) return {w:c.outW,h:c.outH};
  return {w:state.globalW,h:state.globalH};
}

function toggleSettings(i){
  const el=$('csettings-'+i);
  const btn=$('csettings-btn-'+i);
  el.classList.toggle('open');
  btn.classList.toggle('open');
}

function toggleOverride(i){
  const img=state.images[i];
  const c=img.custom;
  c.override=$('coverride-'+i).checked;
  // 开启自定义时，默认使用图片原始尺寸
  if(c.override&&!c.outW&&!c.outH){
    c.outW=img.image.naturalWidth;
    c.outH=img.image.naturalHeight;
  }
  const settings=$('csettings-'+i);
  if(settings&&settings.classList.contains('open')){
    settings.innerHTML=renderSettings(i);
    settings.classList.add('open');
  }
  renderPreview(i);
}

function setCustomVal(i,key,val){
  state.images[i].custom[key]=val;
  renderPreview(i);
}

function resetImage(i){
  state.images[i].custom=createDefaultCustom(
    state.images[i].image.naturalWidth,
    state.images[i].image.naturalHeight
  );
  const settings=$('csettings-'+i);
  if(settings&&settings.classList.contains('open')){
    settings.innerHTML=renderSettings(i);
    settings.classList.add('open');
  }
  renderPreview(i);
  showToast(`#${i+1} 已复位`);
}

// ============ Preview with Drag ============
function renderPreview(idx){
  const entry=state.images[idx];
  if(!entry)return;
  const container=$('cpreview-'+idx);
  if(!container)return;
  const hint=container.querySelector('.drag-hint');
  container.innerHTML='';
  const previewSize=260;
  const canvas=document.createElement('canvas');
  canvas.width=previewSize;
  canvas.height=previewSize;
  const ctx=canvas.getContext('2d');
  drawImageOnCanvas(ctx,entry,previewSize,previewSize);
  container.appendChild(canvas);
  if(hint)container.appendChild(hint);
  setupDrag(idx);
}

function drawImageOnCanvas(ctx,entry,w,h){
  const src=entry.image;
  const idx=state.images.indexOf(entry);
  const c=entry.custom;
  const outSize=getOutputSize(idx);
  const isCustom=c.override;
  // 计算输出框（按真实比例）
  const outRatio=outSize.w/outSize.h;
  let boxX=0,boxY=0,boxW=w,boxH=h;
  if(outRatio>1){
    boxH=h;boxW=h*outRatio;boxX=(w-boxW)/2;
  }else if(outRatio<1){
    boxW=w;boxH=w/outRatio;boxY=(h-boxH)/2;
  }else{
    // 1:1 — 正方形
    const side=Math.min(w,h);
    boxX=(w-side)/2;boxY=(h-side)/2;boxW=side;boxH=side;
  }
  // 底图绘制（cover模式填满输出框）
  const srcRatio=src.naturalWidth/src.naturalHeight;
  let srcScale;
  if(srcRatio>outRatio){
    srcScale=boxH/src.naturalHeight;
  }else{
    srcScale=boxW/src.naturalWidth;
  }
  const finalScale=srcScale*c.zoom;
  const drawW=src.naturalWidth*finalScale;
  const drawH=src.naturalHeight*finalScale;
  const offX=c.offsetX*w/100;
  const offY=c.offsetY*h/100;
  const dx=(w-drawW)/2+offX;
  const dy=(h-drawH)/2+offY;
  // 先画背景
  ctx.save();
  ctx.beginPath();ctx.rect(boxX,boxY,boxW,boxH);ctx.clip();
  ctx.drawImage(src,dx,dy,drawW,drawH);
  ctx.restore();
  // 输出框外遮罩
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.fillRect(0,0,w,boxY);
  ctx.fillRect(0,boxY+boxH,w,h-boxY-boxH);
  ctx.fillRect(0,boxY,boxX,boxH);
  ctx.fillRect(boxX+boxW,boxY,w-boxX-boxW,boxH);
  // 输出框 - 绿色=全局, 红色=自定义
  const boxColor=isCustom?'rgba(230,50,50,0.9)':'rgba(7,193,96,0.85)';
  ctx.strokeStyle=boxColor;
  ctx.lineWidth=2;
  ctx.strokeRect(boxX,boxY,boxW,boxH);
  // 尺寸标注
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.font='11px sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='bottom';
  ctx.fillText(`${outSize.w}×${outSize.h}`,boxX+boxW/2,boxY-4);
  // 模式标签
  ctx.font='10px sans-serif';
  ctx.textAlign='right';
  ctx.textBaseline='top';
  ctx.fillStyle=isCustom?'rgba(230,50,50,0.9)':'rgba(7,193,96,0.85)';
  ctx.fillText(isCustom?'自定义':'全局',boxX+boxW-4,boxY+4);
}

// ============ Drag ============
const dragState={idx:-1,active:false,startX:0,startY:0,startOffX:0,startOffY:0};

function setupDrag(idx){
  const container=$('cpreview-'+idx);
  if(!container)return;
  const canvas=container.querySelector('canvas');
  if(!canvas)return;
  canvas.addEventListener('mousedown',e=>{
    e.preventDefault();
    dragState.idx=idx;
    dragState.active=true;
    dragState.startX=e.clientX;
    dragState.startY=e.clientY;
    const c=state.images[idx].custom;
    dragState.startOffX=c.offsetX;
    dragState.startOffY=c.offsetY;
  });
}

window.addEventListener('mousemove',e=>{
  if(!dragState.active)return;
  const idx=dragState.idx;
  const container=$('cpreview-'+idx);
  if(!container)return;
  const canvas=container.querySelector('canvas');
  if(!canvas)return;
  const rect=canvas.getBoundingClientRect();
  const dxPx=e.clientX-dragState.startX;
  const dyPx=e.clientY-dragState.startY;
  const pctX=Math.round(dxPx/rect.width*100);
  const pctY=Math.round(dyPx/rect.height*100);
  const c=state.images[idx].custom;
  c.offsetX=Math.max(-50,Math.min(50,dragState.startOffX+pctX));
  c.offsetY=Math.max(-50,Math.min(50,dragState.startOffY+pctY));
  renderPreview(idx);
  updateSliderValues(idx);
});

window.addEventListener('mouseup',()=>{dragState.active=false});

function updateSliderValues(idx){
  const c=state.images[idx].custom;
  const settings=$('csettings-'+idx);
  if(!settings||!settings.classList.contains('open'))return;
  const s=settings.querySelectorAll('input[type="range"]');
  s.forEach(el=>{
    const tag=el.nextElementSibling;
    if(!tag)return;
    if(tag.id==='coffXTag-'+idx){el.value=c.offsetX;tag.textContent=c.offsetX}
    if(tag.id==='coffYTag-'+idx){el.value=c.offsetY;tag.textContent=c.offsetY}
    if(tag.id==='czoomTag-'+idx){const v=Math.round(c.zoom*100);el.value=v;tag.textContent=v+'%'}
  });
}

// ============ Process / Export / Preview Modal ============
async function processAll(){
  if(!state.images.length){showToast('请先上传图片');return}
  showLoading('正在处理图片...');
  await new Promise(r=>setTimeout(r,30));
  state.globalW=parseInt($('globalW').value)||800;
  state.globalH=parseInt($('globalH').value)||800;
  state.images.forEach((entry,i)=>{
    entry.canvas=exportSingleImage(i);
  });
  hideLoading();
  $('btnDownload').disabled=false;
  showToast(`已处理 ${state.images.length} 张图片`);
  showReportModal();
}

function showReportModal(){
  const body=$('reportBody');
  const hasCutout=state.enableCutout;
  let html='<div class="preview-report-grid">';
  state.images.forEach((entry,i)=>{
    const outSize=getOutputSize(i);
    html+=`<div class="preview-report-item">
      <div class="label">#${i+1} · ${outSize.w}×${outSize.h}${entry.custom.override?' <span style="color:#e63232">自定义</span>':''}</div>
      <div class="img-wrap" id="rpt-img-${i}"></div>
      <div class="name">${escapeHtml(entry.name)}</div>
    </div>`;
  });
  html+='</div>';
  body.innerHTML=html;
  $('reportSummary').textContent=`共 ${state.images.length} 张 · 全局 ${state.globalW}×${state.globalH}${hasCutout?' · 抠图开启':''} · ${state.jpgQuality<100?'JPG '+state.jpgQuality+'%':'PNG'}`;
  $('reportModal').classList.add('show');
  setTimeout(()=>{
    state.images.forEach((entry,i)=>{
      const wrap=$('rpt-img-'+i);
      if(!wrap)return;
      const outSize=getOutputSize(i);
      const maxShow=180;
      const ratio=outSize.h/outSize.w;
      let sw=maxShow,sh=Math.round(maxShow*ratio);
      if(sh>maxShow*1.5){sh=Math.round(maxShow*1.5);sw=Math.round(sh/ratio)}
      const rc=document.createElement('canvas');
      rc.width=sw;rc.height=sh;
      const rctx=rc.getContext('2d');
      rctx.drawImage(entry.canvas,0,0,sw,sh);
      wrap.appendChild(rc);
    });
  },50);
}

function closeReportModal(){
  $('reportModal').classList.remove('show');
}

function doDownloadFromReport(){
  closeReportModal();
  setTimeout(()=>downloadZip(),200);
}

function exportSingleImage(i){
  const entry=state.images[i];
  const outSize=getOutputSize(i);
  const w=outSize.w,h=outSize.h;
  const canvas=document.createElement('canvas');
  canvas.width=w;canvas.height=h;
  const ctx=canvas.getContext('2d');
  // 抠图
  if(state.enableCutout){
    // 先画到临时canvas处理
    const temp=document.createElement('canvas');
    const src=entry.image;
    temp.width=src.naturalWidth;
    temp.height=src.naturalHeight;
    const tctx=temp.getContext('2d');
    tctx.drawImage(src,0,0);
    const data=tctx.getImageData(0,0,temp.width,temp.height);
    removeBackground(data);
    tctx.putImageData(data,0,0);
    // 从temp裁切到输出
    drawCropped(ctx,temp,entry,w,h);
  }else{
    drawCropped(ctx,entry.image,entry,w,h);
  }
  return canvas;
}

function drawCropped(ctx,src,entry,w,h){
  const c=entry.custom;
  const srcW=src.naturalWidth||src.width;
  const srcH=src.naturalHeight||src.height;
  // 计算输出比例对应的源图区域
  const srcRatio=srcW/srcH;
  const outRatio=w/h;
  let sScale;
  if(srcRatio>outRatio){
    sScale=h/srcH;
  }else{
    sScale=w/srcW;
  }
  const finalScale=sScale*c.zoom;
  const drawW=srcW*finalScale;
  const drawH=srcH*finalScale;
  const offX=c.offsetX*w/100;
  const offY=c.offsetY*h/100;
  const dx=(w-drawW)/2+offX;
  const dy=(h-drawH)/2+offY;
  ctx.drawImage(src,dx,dy,drawW,drawH);
}

function removeBackground(imageData){
  const data=imageData.data;
  const width=imageData.width,height=imageData.height;
  const bg=state.bgColor;
  const tol=state.tolerance;
  const visited=new Uint8Array(width*height);
  const queue=[];
  const isBg=(idx)=>{
    const r=data[idx],g=data[idx+1],b=data[idx+2];
    return Math.abs(r-bg.r)<tol&&Math.abs(g-bg.g)<tol&&Math.abs(b-bg.b)<tol;
  };
  for(let x=0;x<width;x++){
    if(isBg(x*4)&&!visited[x]){queue.push(x);visited[x]=1}
    if(isBg(((height-1)*width+x)*4)&&!visited[(height-1)*width+x]){queue.push((height-1)*width+x);visited[(height-1)*width+x]=1}
  }
  for(let y=0;y<height;y++){
    if(isBg(y*width*4)&&!visited[y*width]){queue.push(y*width);visited[y*width]=1}
    if(isBg((y*width+width-1)*4)&&!visited[y*width+width-1]){queue.push(y*width+width-1);visited[y*width+width-1]=1}
  }
  let head=0;
  while(head<queue.length){
    const pos=queue[head++];
    const x=pos%width,y=(pos-x)/width;
    data[pos*4+3]=0;
    if(x>0&&!visited[pos-1]&&isBg((pos-1)*4)){visited[pos-1]=1;queue.push(pos-1)}
    if(x<width-1&&!visited[pos+1]&&isBg((pos+1)*4)){visited[pos+1]=1;queue.push(pos+1)}
    if(y>0&&!visited[pos-width]&&isBg((pos-width)*4)){visited[pos-width]=1;queue.push(pos-width)}
    if(y<height-1&&!visited[pos+width]&&isBg((pos+width)*4)){visited[pos+width]=1;queue.push(pos+width)}
  }
  if(state.edgeFeather){
    for(let y=0;y<height;y++)for(let x=0;x<width;x++){
      const idx=(y*width+x)*4;
      if(data[idx+3]===0||data[idx+3]<255)continue;
      let nearT=false;
      if(x>0&&data[(y*width+x-1)*4+3]===0)nearT=true;
      if(x<width-1&&data[(y*width+x+1)*4+3]===0)nearT=true;
      if(y>0&&data[((y-1)*width+x)*4+3]===0)nearT=true;
      if(y<height-1&&data[((y+1)*width+x)*4+3]===0)nearT=true;
      if(nearT){
        const r=data[idx],g=data[idx+1],b=data[idx+2];
        const brightness=(r+g+b)/3;
        const bgBrightness=(bg.r+bg.g+bg.b)/3;
        const ratio=Math.abs(brightness-bgBrightness)/255;
        data[idx+3]=Math.round(255*(1-Math.min(1,ratio*1.5)));
      }
    }
  }
}

// ============ Download ============
function downloadSingle(i){
  const canvas=exportSingleImage(i);
  const entry=state.images[i];
  const baseName=entry.name.replace(/\.[^.]+$/,'').replace(/[^\w一-龥]/g,'_').substring(0,30);
  const outSize=getOutputSize(i);
  canvas.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    const ext=state.jpgQuality<100?'jpg':'png';
    a.download=`${baseName}_${outSize.w}x${outSize.h}.${ext}`;
    a.click();
    URL.revokeObjectURL(url);
    showToast(`#${i+1} 已下载`);
  },state.jpgQuality<100?'image/jpeg':'image/png',state.jpgQuality/100);
}

async function downloadZip(){
  if(typeof JSZip==='undefined'){showToast('打包库未加载');return}
  if(!state.images.length||$('btnDownload').disabled){
    showToast('请先生成预览');return
  }
  showLoading('正在打包...');
  try{
    const zip=new JSZip();
    const cropped=zip.folder('cropped');
    const compress=state.compressMode;
    if(compress)zip.folder('original');
    for(let i=0;i<state.images.length;i++){
      const entry=state.images[i];
      const baseName=entry.name.replace(/\.[^.]+$/,'').replace(/[^\w一-龥]/g,'_').substring(0,30);
      const outSize=getOutputSize(i);
      const idxStr=String(i+1).padStart(2,'0');
      const ext=state.jpgQuality<100?'jpg':'png';
      const mime=state.jpgQuality<100?'image/jpeg':'image/png';
      // 裁切图
      const cc=exportSingleImage(i);
      const cBlob=await new Promise(r=>cc.toBlob(r,mime,state.jpgQuality/100));
      cropped.file(`${idxStr}_${baseName}_${outSize.w}x${outSize.h}.${ext}`,cBlob);
      // 原图
      if(compress){
        const origBlob=await new Promise(r=>{
          const tc=document.createElement('canvas');
          tc.width=entry.image.naturalWidth;tc.height=entry.image.naturalHeight;
          tc.getContext('2d').drawImage(entry.image,0,0);
          tc.toBlob(r,'image/png');
        });
        zip.folder('original').file(`${idxStr}_${baseName}.png`,origBlob);
      }
    }
    const content=await zip.generateAsync({type:'blob'});
    const url=URL.createObjectURL(content);
    const a=document.createElement('a');
    a.href=url;
    const now=new Date();
    const ts=now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0')+'_'+String(now.getHours()).padStart(2,'0')+String(now.getMinutes()).padStart(2,'0')+String(now.getSeconds()).padStart(2,'0');
    a.download='压缩包_'+ts+'.zip';
    a.click();
    URL.revokeObjectURL(url);
    hideLoading();
    showToast('打包下载完成');
  }catch(e){
    hideLoading();
    console.error(e);
    showToast('打包失败：'+e.message);
  }
}

// ============ Reset ============
function resetAll(){
  if(!confirm('确定要重置所有内容吗？'))return;
  state.images=[];
  state.enableCutout=false;
  $('enableCutout').checked=false;
  $('cutoutOptions').style.display='none';
  $('fileInput').value='';
  $('fileList').innerHTML='';
  $('btnDownload').disabled=true;
  renderImages();
  showToast('已重置');
}
</script>
