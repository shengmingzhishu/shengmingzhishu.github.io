*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#eef2f7;--panel:#fff;--line:#e7ecf3;--text:#1e293b;--sub:#64748b;--muted:#94a3b8;--accent:#3b82f6;--accent-2:#2563eb;--accent-soft:#dbeafe;--radius:12px;--shadow:0 4px 16px rgba(15,23,42,.06)}
html,body{height:100%}
body{background:var(--bg);font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);line-height:1.6;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.topbar{height:56px;background:#fff;color:#333;display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;border-bottom:1px solid #e8e8e8;box-shadow:0 1px 6px rgba(0,0,0,.04);z-index:30}
.topbar .brand{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;color:#1e293b}
.topbar .brand .logo{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff}
.topbar .spacer{flex:1}
.tbtn{height:34px;padding:0 12px;border-radius:8px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px;transition:.15s;white-space:nowrap}
.tbtn.ghost{background:#f1f4f8;color:#475569}
.tbtn.ghost:hover{background:#e2e8f0}
.tbtn.success{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;box-shadow:0 2px 8px rgba(22,163,74,.3);height:32px;font-size:12px}
.tbtn.success:hover{filter:brightness(1.08)}
.workspace{display:flex;height:calc(100vh - 56px);gap:10px;padding:10px}
.col{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;min-width:0}
.col-left{flex:0 0 45%}
.col-right{flex:1}
.col-head{height:40px;padding:0 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;border-bottom:1px solid var(--line);background:#fbfcfe;font-size:13px;font-weight:700;color:#334155}
.col-head .hint{margin-left:auto;font-weight:400;color:var(--muted);font-size:11px}
.opt-bar{display:flex;align-items:center;gap:6px;padding:6px 10px;border-bottom:1px solid var(--line);flex-wrap:wrap;background:#fafbfc;flex-shrink:0;font-size:12px}
.opt-bar .lbl{font-size:11px;color:var(--muted);font-weight:600;margin-right:2px}
.opt-bar label{font-size:11px;display:inline-flex;align-items:center;gap:2px;cursor:pointer;margin-right:6px}
.opt-bar input[type="radio"]{margin:0;cursor:pointer}
.opt-btn{height:26px;padding:0 10px;border-radius:6px;font-size:11px;font-weight:600;color:#475569;background:#f1f5f9;display:inline-flex;align-items:center;gap:3px;transition:.12s;border:1px solid transparent;cursor:pointer;font-family:inherit}
.opt-btn:hover{background:var(--accent-soft);color:var(--accent-2);border-color:#bfdbfe}
.opt-btn.danger:hover{background:#fee2e2;color:#dc2626;border-color:#fecaca}
.user-row{display:flex;align-items:center;gap:10px;padding:4px 10px;border-bottom:1px solid var(--line);background:#fafbfc;flex-shrink:0;font-size:12px}
.user-row label{font-size:11px;color:var(--muted);font-weight:600}
.user-row input{height:26px;padding:0 8px;border:1px solid #ddd;border-radius:6px;font-size:11px;outline:none;background:#fff}
.user-row input:focus{border-color:var(--accent)}
.editor-wrap{flex:1;position:relative;display:flex;flex-direction:column;min-height:0}
textarea{flex:1;padding:14px 16px;outline:none;border:none;resize:none;font-family:'Courier New',monospace;font-size:13px;line-height:1.7;color:#334155;width:100%;background:#fcfdff}

#toast{position:fixed;top:22px;left:50%;transform:translateX(-50%) translateY(-60px);background:linear-gradient(45deg,#FFD1DC,#FFB5E8);color:#444;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.1);display:flex;align-items:center;gap:6px}

    // 段落模式和对齐方式的全局变量
    let paragraphMode = true; // true: 段落分割，false: 每行为一个块
    let alignMode = 'center';   // 'left' or 'center'
    let userId = ''
    let userName = ''

    // 监听段落模式切换
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('para-on').addEventListener('change', function() {
            if (this.checked) {
                paragraphMode = true;
                updatePreview();
            }
        });
        document.getElementById('para-off').addEventListener('change', function() {
            if (this.checked) {
                paragraphMode = false;
                updatePreview();
            }
        });
        document.getElementById('align-left').addEventListener('change', function() {
            if (this.checked) {
                alignMode = 'left';
                updatePreview();
            }
        });
        document.getElementById('align-center').addEventListener('change', function() {
            if (this.checked) {
                alignMode = 'center';
                updatePreview();
            }
        });
        // 这里可以正常取值。change事件会在输入框失去焦点或内容改变后触发，能获取到最新的值。
        document.getElementById('user-id').addEventListener('change', function(e) {
            userId =  e.target.value;
            updatePreview();
        });
        document.getElementById('user-name').addEventListener('change', function(e) {
            userName = e.target.value;
            updatePreview();
        });
        document.getElementById('clear-enter').addEventListener('click', function() {
            clearEnter()
        });
        document.getElementById('clear-sort').addEventListener('click', function() {
            clearSort()
        });
        document.getElementById('clear-short').addEventListener('click', function() {
            clearShort()
        });
        document.getElementById('format-url').addEventListener('click', function() {
            setUniqueUrlsToEditor()
        });
    });

    
    function clearEnter(){
            // 删除多余的空行（连续两个及以上的空行变成一个空行），并去除首尾空白
            let textArea = document.getElementById('editor');
            let text = textArea.value;
            // 兼容Windows(\r\n)、Mac(\r)和Unix(\n)换行符
            // 1. 替换所有\r\n和\r为\n
            // text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            // 1. 替换所有\r\n和\r为\n
            text = text.replace(/\r\n/g, '').replace(/\r/g, '').replace(/\n\n/g, '\n');
            // 2. 连续两个及以上的空行变成一个空行
            //text = text.replace(/\n{1,}/g, '\n\n');
            // 3. 去除首尾空白
            text = text.trim();
            textArea.value = text;
            updatePreview();
    } 
    
    
    function clearSort(){
            let textArea = document.getElementById('editor');
            let text = textArea.value;
            // 随机乱序
            let lines = text.split('\n');
            let filteredLines = lines.sort(() => Math.random() - 0.5);
            textArea.value =  filteredLines.join('\n');
            updatePreview();
    } 

    
    function clearShort(){
            let textArea = document.getElementById('editor');
            let text = textArea.value;
            // 把text拆分成多行的数据， 仅保留每行字符串去除前后空格后长度大于3的  
            let lines = text.split('\n');
            let filteredLines = lines.filter(line => {
                return line.trim() === '' || line.trim().length > 3;
            });
            textArea.value = filteredLines.join('\n');
            updatePreview();
    }
