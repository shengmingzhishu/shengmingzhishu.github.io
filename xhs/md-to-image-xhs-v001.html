*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;background:#f0f2f5;color:#333;height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
.lp{width:320px;min-width:320px;display:flex;flex-direction:column;background:#fff;border-right:1px solid #e8e8e8}

.ps{flex:1;overflow-y:auto;padding:16px}
.rp{width:200px;min-width:200px;background:#fff;border-left:1px solid #e8e8e8;overflow-y:auto;padding:8px 10px}
.tg{margin-bottom:12px}
.tgt{font-size:10px;font-weight:600;color:#aaa;margin-bottom:4px;letter-spacing:.5px;padding-left:3px}

.cg{margin-bottom:6px}

.cr{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:2px;align-items:center}
.cb{padding:2px 6px;border:1px solid #ddd;border-radius:3px;background:#fafafa;cursor:pointer;font-size:10px;color:#555;transition:all .1s;line-height:1.3}

.cb.act{background:#fe2c55;color:#fff;border-color:#fe2c55}
.cb.xs{padding:1px 4px;font-size:9px}

input.ci{padding:2px 5px;border:1px solid #ddd;border-radius:3px;font-size:10px;outline:none}
input.ci:focus{border-color:#fe2c55}
input.cchk{width:12px;height:12px;cursor:pointer;vertical-align:middle;margin:0}
.bua{border:2px dashed #ddd;border-radius:5px;padding:4px;text-align:center;cursor:pointer;transition:all .2s;background:#fafafa}
.bua:hover{border-color:#fe2c55;background:#fff0f2}
.bpr{width:100%;height:24px;object-fit:cover;border-radius:2px;display:none}
/* 平铺容器 */
#pc{display:flex;flex-flow:row wrap;justify-content:center;align-items:flex-start;gap:14px;width:100%;min-height:200px}
/* 卡片外包装 — 由JS设置尺寸 */
.swp{position:relative;overflow:hidden;border-radius:10px;box-shadow:0 3px 14px rgba(0,0,0,.1);flex-shrink:0;background:#fff}
/* 内层场景 1080×1440 — 由JS设置transform缩放 */
.scene{position:absolute;top:0;left:0;width:1080px;height:1440px;transform-origin:top left}

.sc-cv{display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;height:1440px;padding:60px;position:relative}
.sc-cv .cbg{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.sc-cv .cov{position:relative;z-index:1;width:100%}
.sc-cv .ct{font-weight:800;line-height:1.25;margin-bottom:10px;word-break:break-word}
.sc-cv .cs{font-weight:400;letter-spacing:1px;margin-bottom:8px}

/* 内容 */
.sc-ct{height:1440px;padding:30px 40px 25px;display:flex;flex-direction:column;position:relative}
.sc-ct .cbg{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:.1;pointer-events:none}
.sc-ct .ci{flex:1;overflow:hidden;position:relative;z-index:1}

.ct-ftr{padding-top:8px;border-top:1px solid #eee;margin-top:8px;position:relative;z-index:1;flex-shrink:0}

.mb li{margin:.08em 0}
.mb img{max-width:100%;border-radius:5px;margin:5px 0}
.mb hr{border:none;border-top:1px solid #eee;margin:10px 0}
.mb code{background:rgba(0,0,0,.05);padding:1px 4px;border-radius:2px;font-size:.9em}
.mb a{text-decoration:none;font-weight:500}
.mb table{border-collapse:collapse;width:100%;font-size:.8em;margin:6px 0}
.mb table td,.mb table th{border:1px solid #ddd;padding:3px 6px;text-align:left}

.ps::-webkit-scrollbar,.csr::-webkit-scrollbar,.lt::-webkit-scrollbar,.rp::-webkit-scrollbar{width:3px}
.ps::-webkit-scrollbar-thumb,.csr::-webkit-scrollbar-thumb,.lt::-webkit-scrollbar-thumb,.rp::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
.dlb{padding:6px 16px;background:#fe2c55;color:#fff;border:none;border-radius:18px;cursor:pointer;font-size:11px;font-weight:500;display:flex;align-items:center;gap:5px;transition:all .2s;box-shadow:0 2px 8px rgba(254,44,85,.3);white-space:nowrap}
.dlb:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(254,44,85,.4)}
.dlb:disabled{opacity:.6;cursor:not-allowed;transform:none}
.toast{position:fixed;top:28px;left:50%;transform:translateX(-50%) translateY(-70px);background:rgba(0,0,0,.8);color:#fff;padding:7px 20px;border-radius:9px;font-size:12px;z-index:9999;opacity:0;transition:all .3s;backdrop-filter:blur(8px);pointer-events:none}
.toast.s{opacity:1;transform:translateX(-50%) translateY(0)}
.sp{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.prb{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,#fe2c55,#ff6b81);transition:width .3s;z-index:99999;width:0}
.emp{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;color:#bbb;text-align:center}
.emp .ei{font-size:40px;margin-bottom:10px}
.emp p{font-size:13px;line-height:1.7}
</style>

// ===================== Markdown 渲染 =====================
function rMD(txt){
  if(!txt)return'';
  let h=txt;
  h=h.replace(/^###### (.*$)/gm,'<h6>$1</h6>');
  h=h.replace(/^##### (.*$)/gm,'<h5>$1</h5>');
  h=h.replace(/^#### (.*$)/gm,'<h4>$1</h4>');
  h=h.replace(/^### (.*$)/gm,'<h3>$1</h3>');
  h=h.replace(/^## (.*$)/gm,'<h2>$1</h2>');
  h=h.replace(/^# (.*$)/gm,'<h1>$1</h1>');
  h=h.replace(/\*\*\*(.*?)\*\*\*/g,'<strong><em>$1</em></strong>');
  h=h.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/\*(.*?)\*/g,'<em>$1</em>');
  h=h.replace(/~~(.*?)~~/g,'<del>$1</del>');
  h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h=h.replace(/^> (.*$)/gm,'<blockquote>$1</blockquote>');
  h=h.replace(/^- (.*$)/gm,'<li>$1</li>');
  h=h.replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>');
  h=h.replace(/^\d+\. (.*$)/gm,'<li>$1</li>');
  h=h.replace(/(?!<ul>)(<li>.*<\/li>\n?)+/g,'<ol>$&</ol>');
  h=h.replace(/<ul><ul>/g,'<ul>').replace(/<\/ul><\/ul>/g,'</ul>');
  h=h.replace(/<ol><ol>/g,'<ol>').replace(/<\/ol><\/ol>/g,'</ol>');
  h=h.replace(/^---+$/gm,'<hr>');
  h=h.replace(/!\[(.*?)\]\((.*?)\)/g,'<img src="$2" alt="$1" style="max-width:100%;border-radius:5px;margin:5px 0">');
  h=h.replace(/\[(.*?)\]\((.*?)\)/g,'<a href="$2" style="color:var(--ac,#fe2c55)">$1</a>');
  h=h.replace(/^\|(.+)\|$/gm,m=>{if(m.includes('---'))return'<hr class="tb-s">';const cells=m.split('|').filter(c=>c.trim()).map(c=>c.trim());return'<tr><td>'+cells.join('</td><td>')+'</td></tr>'});
  h=h.replace(/(<tr>.*<\/tr>\n?)+/g,m=>{const rows=m.match(/<tr>.*?<\/tr>/g);if(!rows)return m;const hdr=rows[0],isHdr=rows.length>1&&rows[1].includes('tb-s');if(isHdr){const body=rows.slice(2).filter(Boolean).join('\n');return'<table><thead>'+hdr.replace(/<td>/g,'<th>').replace(/<\/td>/g,'</th>')+'</thead><tbody>'+body+'</tbody></table>'}return'<table><tbody>'+rows.join('\n')+'</tbody></table>'});
  h=h.replace(/<hr class="tb-s">/g,'');
  const la=h.split('\n'),rs=[];for(let i=0;i<la.length;i++){const l=la[i].trim();if(!l){rs.push('');continue}if(/^<(\/)?(h[1-6]|ul|ol|li|blockquote|hr|table|thead|tbody|tr|th|td|pre)/.test(l)){rs.push(l);continue}rs.push('<p>'+l+'</p>')}
  return rs.join('\n');
}

function flush(){

  if(!md.trim()){pc.innerHTML='<div class="emp"><div class="ei">📝</div><p>在左侧输入 Markdown 内容<br>即可实时预览小红书图片效果</p><p style="font-size:11px;margin-top:6px;color:#ccc">💡 点击「示例」快速体验</p></div>';pgi.textContent='共 0 页';return}
  const t=gT(curTpl);
  const font=gi('mi').dataset.font||t.ff,fs=parseInt(gi('mi').dataset.fs)||t.fs,cts=parseInt(gi('mi').dataset.cts)||t.cts,ets=parseInt(gi('mi').dataset.ets)||t.ets||64,hfs=parseInt(gi('mi').dataset.hfs)||20;
  const tc=gi('tc').value,ac=gi('ac').value,bgc=gi('bc').value,ctc=gi('ctc').value,csc=gi('csc').value;

  const fCv=gi('fCv').checked,fCn=gi('fCn').checked,fEd=gi('fEd').checked;
  const lines=md.split('\n'),ne=lines.filter(l=>l.trim());
  const tl=ne[0]||'标题',sl=ne.length>1?ne[1]:'',el=ne.length>2?ne[ne.length-1]:'';
  let cl=[];
  if(ne.length>2){let f=0,cs=-1;for(let i=0;i<lines.length;i++){if(lines[i].trim()){f++;if(f===2){cs=i+1;break}}}if(cs>0){let li=-1,c=-1;for(let i=lines.length-1;i>=0;i--){if(lines[i].trim()){c++;if(c===0){li=i;break}}}for(let i=cs;i<li;i++){if(lines[i].trim())cl.push(lines[i])}}}
  if(!cl.length)cl=['请输入更多内容...'];
  const title=tl.replace(/^#+/,'').trim(),sub=sl.replace(/^#+/,'').trim(),endTxt=el.replace(/^#+/,'').trim();
  const rendered=rMD(cl.join('\n'));
  // 分页
  const lpp=Math.max(3,Math.floor((1440-60-50-50)/(fs*1.8))-2);
  const hl=rendered.split('\n').filter(l=>l.trim());
  const pages=[];let cP=[],cL=0;
  for(let i=0;i<hl.length;i++){const ln=hl[i];let lc=1;if(/^<(h[1-6]|blockquote)/.test(ln))lc=1.5;if(/^<(table|ul|ol)/.test(ln))lc=2.5;if(cL+lc>lpp&&cP.length>0){pages.push(cP.join('\n'));cP=[ln];cL=lc}else{cP.push(ln);cL+=lc}}
  if(cP.length)pages.push(cP.join('\n'));if(!pages.length)pages.push(rendered);
  const bc=bgImg.cover,bn=bgImg.content,be=bgImg.end,scb=bc?'':'background:'+t.cbg,seb=be?'':'background:'+t.ebg,total=1+pages.length+1;
  // 计算平铺尺寸
  const gap=14,cw=gi('ps').clientWidth-32,mw=250,cpr=Math.max(1,Math.floor((cw+gap)/(mw+gap))),cw2=Math.floor((cw-(cpr-1)*gap)/cpr),sc=cw2/1080,ch=Math.round(1440*sc);
  let a='';
  // 封面
  a+=`<div class="swp" style="width:${cw2}px;height:${ch}px"><div class="scene" style="transform:scale(${sc})">
    <div class="sc-cv" style="${scb};position:relative">
    ${bc?'<img class="cbg" src="'+bc+'">':''}
    ${hCv?'<div class="hdr-abs" style="font-size:'+hfs+'px;color:'+csc+'">'+hdrTxt+'</div>':''}
    ${bc?'<div class="cov" style="background:rgba(0,0,0,.25);border-radius:14px;padding:36px 44px">':'<div class="cov">'}
    <div style="position:absolute;top:20px;right:25px;font-size:11px;color:${bc?'rgba(255,255,255,.4)':csc};letter-spacing:1px">小红书</div>
    <div class="ct" style="font-size:${cts}px;color:${ctc};font-family:'${font}',sans-serif">${title}</div>
    ${sub?'<div class="cs" style="font-size:22px;color:'+csc+'">'+sub+'</div>':''}
    <div class="ctg" style="background:rgba(255,255,255,.2);color:${ctc}">${t.ctg||'✨ 推荐'}</div></div>
    <div class="auth-ln" style="text-align:${authAlign};color:${csc};opacity:.8;position:absolute;bottom:56px;left:60px;right:60px">✎ ${author}</div>
    ${fCv?'<div class="ftr-abs" style="font-size:'+hfs+'px;color:'+csc+'">'+fmtFtr+'</div>':''}
    <div class="bdg">📕 封面</div><div class="bdg-pg">1/${total}</div></div></div></div>`;
  // 内容
  pages.forEach((h,i)=>{
    a+=`<div class="swp" style="width:${cw2}px;height:${ch}px"><div class="scene" style="transform:scale(${sc})">
      <div class="sc-ct" style="background:${bgc};color:${tc};position:relative">
      ${bn?'<img class="cbg" src="'+bn+'">':''}
      ${hCn?'<div class="hdr-ln ct-hdr" style="font-size:'+hfs+'px;color:'+ac+';text-align:center;font-family:\''+font+'\',sans-serif">'+hdrTxt+'</div>':''}
      <div class="ci"><div class="csr mb" style="font-size:${fs}px;color:${tc};font-family:'${font}',sans-serif;--ac:${ac}">${h}</div></div>
      ${fCn?'<div class="ftr-ln ct-ftr" style="font-size:'+hfs+'px;color:#aaa;text-align:center">'+fmtFtr+'</div>':''}
      <div class="auth-ln" style="text-align:${authAlign};color:#bbb;font-size:12px">✎ ${author}</div>
      <div class="bdg">📄 ${i+1}/${pages.length}</div><div class="bdg-pg">${i+2}/${total}</div></div></div></div>`;
  });
  // 尾页
  a+=`<div class="swp" style="width:${cw2}px;height:${ch}px"><div class="scene" style="transform:scale(${sc})">
    <div class="sc-en" style="${seb};position:relative">
    ${be?'<img class="ebg" src="'+be+'">':''}
    ${hEd?'<div class="hdr-abs" style="font-size:'+hfs+'px;color:'+csc+'">'+hdrTxt+'</div>':''}
    <div class="econ" style="${be?'background:rgba(0,0,0,.25);':''}">

    <div class="etl" style="font-size:${ets}px;color:${ctc}">${endTxt||t.et||'感谢阅读'}</div>
    <div class="esb" style="color:${csc}">${t.es||'关注获取更多'}</div>

    ${fEd?'<div class="ftr-abs" style="font-size:'+hfs+'px;color:'+csc+'">'+fmtFtr+'</div>':''}

  pc.innerHTML=a;
  pgi.textContent='共 '+total+' 页 (封面 '+pages.length+'页内容 尾页)';

// ===================== 下载 =====================
async function dlA(){
  if(dlBusy){shT('正在下载中...',true);return}
  const elts=qsa('.swp');
  if(!elts.length){shT('没有可下载的内容',true);return}
  dlBusy=true;const btn=gi('dlBtn');
  const orig=btn.innerHTML;btn.innerHTML='<span class="sp"></span> 生成中...';btn.disabled=true;setP(5);
  try{
    // 临时展开到1080×1440用于截图：仅去掉缩放，保持absolute定位不变
    elts.forEach(w=>{w.style.width='1080px';w.style.height='1440px';w.style.overflow='visible';const s=w.querySelector('.scene');if(s){s.style.transform='none'}});
    await new Promise(r=>setTimeout(r,400));
    let useZip=false;try{if(typeof JSZip!=='undefined')useZip=true}catch(e){}
    if(useZip){
      setP(10);const zip=new JSZip();
      for(let i=0;i<elts.length;i++){setP(10+((i/elts.length)*80));const card=elts[i];if(!card)continue;try{const cv=await html2canvas(card,{scale:2,useCORS:true,backgroundColor:null,logging:false});const bl=await new Promise(r=>cv.toBlob(r,'image/png'));const nm=['cover'];for(let j=1;j<=elts.length-2;j++)nm.push('content_'+j);nm.push('end');zip.file('xhs_'+(nm[i]||'p'+(i+1))+'.png',bl)}catch(e){console.warn(i+1,'failed:',e)}}
      setP(95);const zb=await zip.generateAsync({type:'blob'});setP(98);
      const ln=document.createElement('a');ln.href=URL.createObjectURL(zb);ln.download='小红书配图_'+new Date().toISOString().slice(0,10)+'.zip';
      document.body.appendChild(ln);ln.click();document.body.removeChild(ln);URL.revokeObjectURL(ln.href);
      setP(100);shT('✅ 下载完成！共 '+elts.length+' 页');setTimeout(()=>setP(0),2000);
    }else{
      for(let i=0;i<elts.length;i++){const card=elts[i];if(!card)continue;try{const cv=await html2canvas(card,{scale:2,useCORS:true,backgroundColor:null,logging:false});const ln=document.createElement('a');ln.download='xhs_'+(i===0?'cover':i===elts.length-1?'end':'content_'+(i))+'.png';ln.href=cv.toDataURL('image/png');document.body.appendChild(ln);ln.click();document.body.removeChild(ln);await new Promise(r=>setTimeout(r,80))}catch(e){console.warn(i+1,'failed:',e)}}
      shT('✅ 下载完成');
    }
  }catch(err){console.error(err);shT('下载失败: '+err.message,true);setP(0)}
  flush(); // 重新渲染恢复平铺
  btn.innerHTML=orig;btn.disabled=false;dlBusy=false;
}
